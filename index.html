<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#102a43">
<title>Energy Quest - Situation Deck</title>
<style>
:root{
  --navy:#102a43;--navy2:#173f62;--gold:#f2b134;--paper:#fffdf7;--ink:#17212b;
  --muted:#64748b;--green:#25e65b;--shadow:0 22px 55px rgba(4,19,34,.3);
  --ease:cubic-bezier(.2,.75,.2,1)
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(145deg,#091d30,#163d5d);color:var(--ink)}
body{min-height:100vh;min-height:100svh;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);display:flex;justify-content:center;overflow-x:hidden}
button{font:inherit}
.app{width:min(100%,520px);min-height:100vh;min-height:100svh;display:flex;flex-direction:column;padding:16px 0 20px}
header{color:#fff;text-align:center;padding:4px 10px 14px}.eyebrow{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;opacity:.7;font-weight:800}h1{margin:7px 0 2px;font-size:clamp(1.85rem,8vw,2.7rem);line-height:1}.subtitle{margin:0;font-size:.94rem;opacity:.8}
.screen{flex:1;min-height:430px;display:flex;flex-direction:column;justify-content:center}.hidden{display:none!important}
.notice{display:none;background:#fff7d6;color:#543f00;border-radius:14px;padding:14px 16px;margin-bottom:12px;font-size:.9rem;line-height:1.4}.notice.show{display:block}

/* Draw screen / card back */
.deck-stage{perspective:1400px;position:relative;min-height:430px;display:flex;align-items:center;justify-content:center}
.deck-stage::before,.deck-stage::after{content:"";position:absolute;width:92%;height:94%;border-radius:26px;background:#dfe7ef;box-shadow:0 12px 35px rgba(0,0,0,.18);transition:transform .18s ease}
.deck-stage::before{transform:translate(7px,8px) rotate(1.2deg);opacity:.7}.deck-stage::after{transform:translate(-6px,4px) rotate(-1deg);opacity:.9}
.deck-stage.shuffling::before{animation:shuffleLeft .22s ease}.deck-stage.shuffling::after{animation:shuffleRight .22s ease}
@keyframes shuffleLeft{50%{transform:translate(-20px,4px) rotate(-4deg)}}
@keyframes shuffleRight{50%{transform:translate(22px,8px) rotate(4deg)}}
.draw-card{position:relative;z-index:2;width:100%;min-height:410px;border:4px solid rgba(255,255,255,.9);border-radius:26px;background:
  radial-gradient(circle at 25% 18%,rgba(255,255,255,.14),transparent 28%),
  repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0 2px,transparent 2px 9px),
  linear-gradient(145deg,#1b4a70,#0b263e);color:#fff;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;text-align:center;padding:28px;cursor:pointer;touch-action:manipulation;transition:transform .16s ease,box-shadow .16s ease}
.draw-card:active,.done:active,.continue:active{transform:scale(.985)}
.crest{width:210px;height:210px;border-radius:50%;border:3px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.14);box-shadow:inset 0 0 0 9px rgba(255,255,255,.05),0 0 0 1px rgba(255,255,255,.12)}
.icon{font-size:3.2rem;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.25))}.crest strong{font-size:1.42rem;margin-top:10px}.crest small{margin-top:8px;opacity:.8;letter-spacing:.14em;text-transform:uppercase;font-weight:700}

/* True 3D flip */
.flip-stage{perspective:1400px;min-height:430px}.flip-card{position:relative;min-height:410px;transform-style:preserve-3d;transform:rotateY(180deg);transition:transform .72s var(--ease)}
.flip-card.flipped{transform:rotateY(0)}
.card-face{position:absolute;inset:0;min-height:410px;border-radius:26px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;box-shadow:var(--shadow)}
.card-back-mini{transform:rotateY(180deg);border:4px solid rgba(255,255,255,.9);background:
  radial-gradient(circle at 25% 18%,rgba(255,255,255,.14),transparent 28%),
  repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0 2px,transparent 2px 9px),
  linear-gradient(145deg,#1b4a70,#0b263e);display:flex;align-items:center;justify-content:center;color:#fff}
.card-back-mini .mini-mark{width:150px;height:150px;border-radius:50%;border:3px solid var(--gold);display:grid;place-items:center;font-size:3rem;background:rgba(0,0,0,.12)}
.situation-card{border:4px solid rgba(255,255,255,.9);background:var(--paper);display:flex;flex-direction:column}
.role-band{padding:19px 23px;color:#fff;background:var(--role-color,#1f6feb);font-weight:900;letter-spacing:.01em;font-size:1.05rem;box-shadow:inset 0 -1px 0 rgba(0,0,0,.12)}
.situation{padding:28px 25px 20px;display:flex;flex:1;flex-direction:column;justify-content:center;text-align:center}.label{text-transform:uppercase;letter-spacing:.17em;font-size:.72rem;color:var(--muted);font-weight:900;margin-bottom:14px}.situation p{font-family:Georgia,"Times New Roman",serif;font-size:clamp(1.22rem,5.3vw,1.62rem);line-height:1.43;margin:0}
.prompt{border-top:1px solid #ddd7ca;padding:16px 22px 18px;text-align:center;color:#536273;font-size:.88rem;line-height:1.42;background:#faf7ef}.prompt strong{color:#24364a}
.done,.continue{width:100%;margin-top:14px;border:0;border-radius:17px;padding:18px 14px;min-height:64px;font-size:1.28rem;font-weight:950;cursor:pointer;touch-action:manipulation;transition:transform .14s ease,filter .14s ease}
.done{background:linear-gradient(180deg,#3cf26e,#22d957);color:#052b0e;box-shadow:0 10px 26px rgba(37,230,91,.34),inset 0 1px 0 rgba(255,255,255,.55)}
.done:hover{filter:brightness(1.03)}

/* Celebration */
.celebration{position:relative;min-height:410px;border:4px solid rgba(255,255,255,.9);border-radius:26px;background:radial-gradient(circle at 50% 26%,rgba(255,255,255,.2),transparent 34%),linear-gradient(145deg,#1d5078,#102a43);box-shadow:var(--shadow);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 26px;overflow:hidden;animation:fadeUp .42s var(--ease)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.burst{font-size:4rem;animation:pop .52s ease-out}@keyframes pop{0%{transform:scale(.35) rotate(-12deg);opacity:0}72%{transform:scale(1.14) rotate(4deg);opacity:1}100%{transform:scale(1)}}
.cheer{font-size:clamp(2.2rem,11vw,3.6rem);line-height:1;margin:12px 0 22px;color:#ffe17a;text-shadow:0 3px 14px rgba(0,0,0,.25)}
.move-copy{font-size:clamp(1.22rem,5vw,1.58rem);line-height:1.42;max-width:400px;margin:0;font-weight:700}
.continue{background:linear-gradient(180deg,#ffd05d,#f2b134);color:#302000;box-shadow:0 10px 26px rgba(242,177,52,.3),inset 0 1px 0 rgba(255,255,255,.65)}
.confetti{position:absolute;top:-20px;width:10px;height:16px;border-radius:2px;opacity:.95;animation:fall var(--fall,2.4s) linear forwards;transform:translate3d(0,0,0) rotate(0deg)}
@keyframes fall{to{transform:translate3d(var(--drift,0),470px,0) rotate(720deg);opacity:.2}}
.footer-actions{display:flex;justify-content:center;margin-top:12px}.link-button{border:0;background:transparent;color:rgba(255,255,255,.72);font-weight:650;font-size:.82rem;padding:9px 12px;text-decoration:underline;text-underline-offset:3px;cursor:pointer}
@media(max-height:720px){.screen,.deck-stage,.flip-stage,.draw-card,.flip-card,.card-face,.celebration{min-height:350px}.crest{width:170px;height:170px}.situation{padding:20px 22px}.situation p{font-size:1.17rem}header{padding-bottom:8px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}.flip-card{transform:none}.confetti{display:none}}
</style>
</head>
<body>
<main class="app">
<header><div class="eyebrow">Team Challenge</div><h1>Energy Quest</h1><p class="subtitle">Digital situation deck</p></header>
<div id="notice" class="notice"></div>

<section id="drawScreen" class="screen">
  <div id="deckStage" class="deck-stage">
    <button id="drawBtn" class="draw-card" type="button" aria-label="Draw a situation card">
      <span class="crest"><span class="icon">⚡</span><strong>Draw Situation</strong><small>Tap to draw</small></span>
    </button>
  </div>
</section>

<section id="cardScreen" class="screen hidden">
  <div class="flip-stage">
    <div id="flipCard" class="flip-card">
      <div class="card-face card-back-mini"><div class="mini-mark">⚡</div></div>
      <article id="situationCard" class="card-face situation-card">
        <div id="roleBand" class="role-band">Role: <span id="roleName"></span></div>
        <div class="situation"><div class="label">Situation:</div><p id="situationText"></p></div>
        <div id="discussionPrompt" class="prompt"></div>
      </article>
    </div>
  </div>
  <button id="doneBtn" class="done" type="button">Done</button>
</section>

<section id="celebrateScreen" class="screen hidden">
  <div id="celebration" class="celebration">
    <div class="burst">🎉</div>
    <h2 id="cheer" class="cheer">Great!</h2>
    <p class="move-copy">Now move your game piece by the number of spaces shown on your spinner.</p>
  </div>
  <button id="continueBtn" class="continue" type="button">Continue</button>
</section>

<div class="footer-actions"><button id="resetBtn" class="link-button" type="button">Reset and reshuffle deck</button></div>
</main>
<script>
const FALLBACK_CARDS=[
{role:"BPC",text:"A customer asks whether a promising energy-saving measure is really worth pursuing, but the available analysis is incomplete. How do you help the team make progress without overstating what is known?"},
{role:"BPC",text:"The project team keeps focusing on incentive dollars, while a larger operational benefit may matter more to the owner. How do you redirect the conversation?"},
{role:"EEPS",text:"Required owner information is still missing and the project schedule is beginning to tighten. How do you move the request forward without making the process feel bureaucratic?"},
{role:"EEPS",text:"A consultant and customer each believe the other person is responsible for the next administrative step. How do you clarify ownership and timing?"},
{role:"MV",text:"The installed equipment does not exactly match the assumptions used during design. How do you determine whether the difference matters and explain the next step?"},
{role:"MV",text:"Field conditions make one measurement unreliable. How do you document the limitation and still provide the most useful conclusion possible?"},
{role:"Scheduler",text:"The preferred meeting time works for the consultant but excludes a key decision-maker. How do you balance speed with the need for the right people in the room?"},
{role:"Scheduler",text:"A meeting has been rescheduled twice and the project is losing momentum. What message would help secure a firm date without sounding inflexible?"},
{role:"Software",text:"A calculation error appears only sometimes, and no one can reproduce it consistently. What information should you request before trying to fix the bug?"},
{role:"Software",text:"A requested fix could solve one user's problem but create unexpected effects elsewhere. How do you evaluate the trade-off and communicate the risk?"}
];
const CHEERS=["Great!","Fantastic!","Outstanding!","Way to Go!","Excellent!","Nicely Done!","Brilliant!","You Got It!","Terrific!","Well Played!","Superb!","Wonderful!"];
const ROLE_COLORS={BPC:'#1f6feb',EEPS:'#7c4dbe',MV:'#0f8b8d',Scheduler:'#d97706',Software:'#b4234d'};
const AUTO_COLORS=['#2563eb','#7c3aed','#0f8b8d','#d97706','#b4234d','#16803a','#c2410c','#475569','#0369a1','#9333ea','#a16207','#0f766e'];
const $=id=>document.getElementById(id);
const drawScreen=$('drawScreen'),cardScreen=$('cardScreen'),celebrateScreen=$('celebrateScreen');
const drawBtn=$('drawBtn'),doneBtn=$('doneBtn'),continueBtn=$('continueBtn'),resetBtn=$('resetBtn');
const deckStage=$('deckStage'),flipCard=$('flipCard'),roleBand=$('roleBand'),roleName=$('roleName'),situationText=$('situationText'),discussionPrompt=$('discussionPrompt'),notice=$('notice'),cheer=$('cheer'),celebration=$('celebration');
let CARDS=[],deck=[],current=null;

function parseCSV(csv){
  const rows=[];let row=[],field='',quoted=false;
  for(let i=0;i<csv.length;i++){
    const c=csv[i],n=csv[i+1];
    if(c==='"'&&quoted&&n==='"'){field+='"';i++;}
    else if(c==='"'){quoted=!quoted;}
    else if(c===','&&!quoted){row.push(field);field='';}
    else if((c==='\n'||c==='\r')&&!quoted){if(c==='\r'&&n==='\n')i++;row.push(field);field='';if(row.some(v=>v.trim()))rows.push(row);row=[];}
    else{field+=c;}
  }
  if(field||row.length){row.push(field);if(row.some(v=>v.trim()))rows.push(row);}
  if(rows.length<2)return[];
  const headers=rows[0].map(h=>h.trim().toLowerCase()),ri=headers.indexOf('role'),si=headers.indexOf('situation');
  if(ri<0||si<0)return[];
  return rows.slice(1).map(r=>({role:(r[ri]||'').trim(),text:(r[si]||'').trim()})).filter(x=>x.role&&x.text);
}
async function loadCards(){
  try{const r=await fetch('situations.csv',{cache:'no-store'});if(!r.ok)throw new Error();const parsed=parseCSV(await r.text());if(!parsed.length)throw new Error();CARDS=parsed;}
  catch(e){CARDS=FALLBACK_CARDS.slice();}
  initialize();
}
function shuffle(items){const a=items.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function roleColor(role){if(ROLE_COLORS[role])return ROLE_COLORS[role];let hash=0;for(const ch of role)hash=((hash<<5)-hash)+ch.charCodeAt(0);return AUTO_COLORS[Math.abs(hash)%AUTO_COLORS.length];}
function safeSave(){try{localStorage.setItem('energyQuestV5',JSON.stringify({deck,current,total:CARDS.length}));}catch(e){}}
function safeRestore(){try{const s=JSON.parse(localStorage.getItem('energyQuestV5'));if(s&&Array.isArray(s.deck)&&s.total===CARDS.length){deck=s.deck;current=s.current||null;return true;}}catch(e){}return false;}
function showOnly(screen){[drawScreen,cardScreen,celebrateScreen].forEach(x=>x.classList.add('hidden'));screen.classList.remove('hidden');window.scrollTo(0,0);}
function showDraw(){current=null;notice.classList.remove('show');showOnly(drawScreen);safeSave();}
function displayCard(){
  roleBand.style.setProperty('--role-color',roleColor(current.role));
  roleName.textContent=current.role;
  situationText.textContent=current.text;
  discussionPrompt.innerHTML='Discuss how <strong></strong> might resolve. When the group agrees, tap <strong>Done!</strong>';
  discussionPrompt.querySelector('strong').textContent=current.role;
  flipCard.classList.remove('flipped');
  showOnly(cardScreen);
  requestAnimationFrame(()=>requestAnimationFrame(()=>flipCard.classList.add('flipped')));
  safeSave();
}
function drawCard(){
  if(deck.length===0){notice.textContent='All situations have been drawn. Reset and reshuffle the deck to continue.';notice.classList.add('show');return;}
  deckStage.classList.remove('shuffling');void deckStage.offsetWidth;deckStage.classList.add('shuffling');
  drawBtn.disabled=true;
  setTimeout(()=>{current=deck.pop();displayCard();drawBtn.disabled=false;},240);
}
function launchConfetti(){
  celebration.querySelectorAll('.confetti').forEach(x=>x.remove());
  const colors=['#ffe17a','#25e65b','#63b3ed','#ffffff','#f2b134','#c084fc'];
  for(let i=0;i<34;i++){
    const p=document.createElement('span');p.className='confetti';p.style.left=(Math.random()*100)+'%';p.style.background=colors[i%colors.length];p.style.setProperty('--fall',(1.8+Math.random()*1.4)+'s');p.style.setProperty('--drift',((Math.random()-.5)*150)+'px');p.style.animationDelay=(Math.random()*.35)+'s';celebration.appendChild(p);
  }
}
function done(){current=null;cheer.textContent=CHEERS[Math.floor(Math.random()*CHEERS.length)];showOnly(celebrateScreen);launchConfetti();safeSave();}
function resetDeck(){if(!window.confirm('Reset the deck and reshuffle all situations?'))return;deck=shuffle(CARDS);current=null;try{localStorage.removeItem('energyQuestV5');}catch(e){}showDraw();}
function initialize(){if(!safeRestore()){deck=shuffle(CARDS);current=null;}if(current)displayCard();else showDraw();}
drawBtn.addEventListener('click',drawCard);doneBtn.addEventListener('click',done);continueBtn.addEventListener('click',showDraw);resetBtn.addEventListener('click',resetDeck);loadCards();
</script>
</body>
</html>
